[vendor]
simple_model = "openai"
complex_model = "openai"
embeddings_model = "ollama"

[ollama]
simple_model = "qwen2.5-vl"
complex_model = "qwen2.5-vl"
embeddings_model = "nomic-embed-text"
base_url = "http://localhost:11434"

[openai]
simple_model = "Qwen/Qwen2.5-VL-7B-Instruct"
complex_model = "Qwen/Qwen2.5-VL-7B-Instruct"
embeddings_model = "text-embedding-ada-002"
base_url = "http://localhost:8000/v1/"

[aws]
simple_model = "anthropic.claude-3-haiku-20240307-v1:0"
complex_model = "anthropic.claude-3-5-sonnet-20240620-v1:0"
embeddings_model = "amazon.titan-embed-text-v1"
region_name = "us-east-1"

[google]
simple_model = "gemini-3-flash"
complex_model = "gemini-3-pro"
embeddings_model = "text-embedding-004"

[tracing]
project = "scoutmini-rai"

[tracing.langfuse]
use_langfuse = false
host = "http://localhost:3000"

[tracing.langsmith]
use_langsmith = false
host = "https://api.smith.langchain.com"

[task_server]
host = "0.0.0.0"
port = 8090

[asr]
recording_device_name = "default"
transcription_model = "LocalWhisper"
language = "en"
vad_model = "SileroVAD"
silence_grace_period = 0.3
vad_threshold = 0.3
use_wake_word = false
wake_word_model = ""
wake_word_threshold = 0.5
wake_word_model_name = ""
transcription_model_name = "small"

[tts]
vendor = "KokoroTTS"
voice = ""
speaker_device_name = "default"
